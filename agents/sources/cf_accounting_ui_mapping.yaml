name: cf_accounting_ui_mapping
description: |
  This source refers to the main codebase of the ClearFacts webapp. 
  The ontology should focus on the main entities and actions available in the UI and the main user journeys.
  It should identify main UI Screens and the main entities and actions available on those screens. 
  The ontology should be abled to explain functionality and navigation to users and agentic test systems (e.g. using playwright mcp server) 
  and be able to link those to the underlying codebase if possible. 
  The UI is also split over different projects, so it is important to capture links to other projects (and code bases) if possible so we can build them separately and link them together in the ontology.
